<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rickson Two Times</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

button {
  padding: 12px 20px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.products {
  display: none;
  padding: 20px;
}

.card {
  background: #111;
  padding: 15px;
  margin: 10px 0;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="center">
  <h1>ACCESS GRANTED</h1>
  <h1>WELCOME TO RICKSON'S STORE</h1>
  <button onclick="enter()">ENTER STORE</button>
</div>

<!-- STORE -->
<div id="store" class="products">
  <h2>Shop</h2>

  <button onclick="toggleCart()" style="background:#222;">
    🛒 View Cart (<span id="cart-count">0</span>)
  </button>

  <!-- PRODUCTS -->
  <div class="card">
    <h3>Black Hoodie</h3>
    <p>KES 2500</p>
    <button onclick="addToCart('Black Hoodie', 2500)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>White T-Shirt</h3>
    <p>KES 1500</p>
    <button onclick="addToCart('White T-Shirt', 1500)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Oversized Hoodie</h3>
    <p>KES 3000</p>
    <button onclick="addToCart('Oversized Hoodie', 3000)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Premium Cap</h3>
    <p>KES 1200</p>
    <button onclick="addToCart('Cap', 1200)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Graphic Tee</h3>
    <p>KES 1800</p>
    <button onclick="addToCart('Graphic Tee', 1800)">Add to Cart</button>
  </div>

  <!-- CART -->
  <div id="cart" style="display:none; background:#111; padding:15px; margin-top:20px;">
    <h3>Your Cart</h3>
    <div id="cart-items"></div>
    <p>Total: KES <span id="cart-total">0</span></p>

    <button onclick="checkout()">Checkout</button>
    <button onclick="toggleCart()" style="background:gray;">Close</button>
  </div>
</div>

<script>

let cart = [];

// ENTER STORE
function enter() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('store').style.display = 'block';
}

// ADD TO CART
function addToCart(name, price) {
  cart.push({ name, price });
  updateCart();
  alert(name + " added to cart");
}

// UPDATE CART UI
function updateCart() {
  let items = document.getElementById("cart-items");
  let count = document.getElementById("cart-count");
  let total = document.getElementById("cart-total");

  items.innerHTML = "";
  let sum = 0;

  cart.forEach((item, index) => {
    sum += item.price;

    items.innerHTML += `
      <div>
        ${item.name} - KES ${item.price}
        <button onclick="removeItem(${index})">❌</button>
      </div>
    `;
  });

  count.innerText = cart.length;
  total.innerText = sum;
}

// REMOVE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  updateCart();
}

// TOGGLE CART
function toggleCart() {
  let cartBox = document.getElementById("cart");
  cartBox.style.display = cartBox.style.display === "none" ? "block" : "none";
}

// CHECKOUT
function checkout() {
  let phone = prompt("Enter M-Pesa number:");
  if (phone) {
    alert("Payment request sent to " + phone);
  }
}

</script>

</body>
</html>
