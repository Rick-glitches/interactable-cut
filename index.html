<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactable Cut</title>
<style>
body {<div id="entry">

    <div class="enter" onclick="showPassword()">
        > ENTER
    </div>

    <!-- PASSWORD -->
    <div id="passwordBox">
        <p>ENTER PASSWORD</p>
        <input type="password" id="pass">
        <button onclick="checkPass()">Submit</button>
    </div>

    <!-- ACCESS -->
    <div id="access"></div>

</div>



<div id="store" class="products">
  <h2>Shop</h2>

  <div class="card">
    <h3>Black Hoodie</h3>
    <p>KES 2500</p>
    <button onclick="buy('Hoodie')">Buy</button>
  </div>

  <div class="card">
    <h3>White T-Shirt</h3>
    <p>KES 1500</p>
    <button onclick="buy('T-Shirt')">Buy</button>
  </div>

</div>

<script>
function enter() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('store').style.display = 'block';
}

function buy(item) {
  let phone = prompt("Enter M-Pesa phone number:");
  if(phone) {
    alert("Payment request sent to " + phone + " for " + item);
  }
}
</script>

</body>
</html>
