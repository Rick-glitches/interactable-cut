<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronVow</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    overflow: hidden;
}

/* ENTRY */
#entry {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1") center/cover;
    position: relative;
}

/* DARK OVERLAY */
#entry::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,30,0.85);
}

/* ANIMATED LIGHT GLOW */
#entry::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,150,255,0.2), transparent 60%);
    animation: moveLight 10s linear infinite;
}

@keyframes moveLight {
    0% { transform: translate(-20%, -20%); }
    50% { transform: translate(20%, 20%); }
    100% { transform: translate(-20%, -20%); }
}

/* TEXT */
.enter {
    z-index: 2;
    font-size: 26px;
    cursor: pointer;
}

/* PASSWORD */
#passwordBox {
    display: none;
    z-index: 2;
}

input {
    padding: 10px;
    margin-top: 10px;
    background: black;
    border: 1px solid white;
    color: white;
}

button {
    margin-top: 10px;
    padding: 8px;
    cursor: pointer;
}

/* ACCESS TEXT */
#access {
    display: none;
    z-index: 2;
    font-size: 22px;
}

/* STORE */
#store {
    display: none;
    padding: 20px;
    background: #0a0a0a;
    min-height: 100vh;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #111;
    padding: 10px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">

    <div class="enter" onclick="showPassword()">
        > ENTER
    </div>

    <!-- PASSWORD -->
    <div id="passwordBox">
        <p>ENTER PASSWORD</p>
        <input type="password" id="pass">
        <button onclick="checkPass()">Submit</button>
    </div>

    <!-- ACCESS -->
    <div id="access"></div>

</div>

<div id="store" class="products">
  <h2>Shop</h2>

  <div class="card">
    <h3>Black Hoodie</h3>
    <p>KES 2500</p>
    <button onclick="buy('Hoodie')">Buy</button>
  </div>

  <div class="card">
    <h3>White T-Shirt</h3>
    <p>KES 1500</p>
    <button onclick="buy('T-Shirt')">Buy</button>
  </div>

</div>

<script>
function enter() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('store').style.display = 'block';
}

function buy(item) {
  let phone = prompt("Enter M-Pesa phone number:");
  if(phone) {
    alert("Payment request sent to " + phone + " for " + item);
  }
}
</script>

</body>
</html>
