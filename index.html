<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronVow</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: monospace;
    overflow: hidden;
}

/* ENTRY */
#entry {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1") center/cover;
    position: relative;
}

/* DARK OVERLAY */
#entry::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,30,0.85);
}

/* ANIMATED LIGHT GLOW */
#entry::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,150,255,0.2), transparent 60%);
    animation: moveLight 10s linear infinite;
}

@keyframes moveLight {
    0% { transform: translate(-20%, -20%); }
    50% { transform: translate(20%, 20%); }
    100% { transform: translate(-20%, -20%); }
}

/* TEXT */
.enter {
    z-index: 2;
    font-size: 26px;
    cursor: pointer;
}

/* PASSWORD */
#passwordBox {
    display: none;
    z-index: 2;
}

input {
    padding: 10px;
    margin-top: 10px;
    background: black;
    border: 1px solid white;
    color: white;
}

button {
    margin-top: 10px;
    padding: 8px;
    cursor: pointer;
}

/* ACCESS TEXT */
#access {
    display: none;
    z-index: 2;
    font-size: 22px;
}

/* STORE */
#store {
    display: none;
    padding: 20px;
    background: #0a0a0a;
    min-height: 100vh;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: #111;
    padding: 10px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">

    <div class="enter" onclick="showPassword()">
        > ENTER
    </div>

    <!-- PASSWORD -->
    <div id="passwordBox">
        <p>ENTER PASSWORD</p>
        <input type="password" id="pass">
        <button onclick="checkPass()">Submit</button>
    </div>

    <!-- ACCESS -->
    <div id="access"></div>

</div>

<!-- STORE -->
<div id="store">
    <h2>IronVow</h2>
    <p id="cart">Cart (0)</p>

    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/200x250">
            <p>Iron Tee</p>
            <button onclick="addCart()">Add</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x250">
            <p>Warrior Hoodie</p>
            <button onclick="addCart()">Add</button>
        </div>
    </div>
</div>

<audio id="sound" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>

<script>
let cart = 0;
let password = "iron"; // CHANGE THIS

function showPassword() {
    document.querySelector(".enter").style.display = "none";
    document.getElementById("passwordBox").style.display = "block";
}

function checkPass() {
    let input = document.getElementById("pass").value;

    if(input === password){
        document.getElementById("sound").play();
        typeAccess();
    } else {
        alert("ACCESS DENIED");
    }
}

/* TYPING EFFECT */
function typeAccess() {
    document.getElementById("passwordBox").style.display = "none";
    let text = "ACCESS GRANTED";
    let i = 0;
    let access = document.getElementById("access");
    access.style.display = "block";

    let typing = setInterval(() => {
        access.innerHTML += text[i];
        i++;
        if(i >= text.length){
            clearInterval(typing);
            setTimeout(() => {
                enterStore();
            }, 1000);
        }
    }, 100);
}

function enterStore() {
    document.getElementById("entry").style.display = "none";
    document.getElementById("store").style.display = "block";
}

function addCart() {
    cart++;
    document.getElementById("cart").innerText = "Cart (" + cart + ")";
}
</script>

</body>
</html>
