<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronVow Clothing</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: #000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to right, #000, #222);
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .products {
            padding: 40px;
            text-align: center;
        }

        .product-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .product-card {
            background: #222;
            padding: 15px;
            width: 220px;
            border-radius: 10px;
        }

        .product-card img {
            width: 100%;
            border-radius: 8px;
        }

        .product-card h3 {
            margin: 10px 0 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #000;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">IronVow</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <h1>Built for Strength</h1>
        <p>Premium streetwear inspired by power, discipline, and purpose.</p>
        <button class="btn" onclick="shopNow()">Shop Now</button>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="products">
        <h2>Featured Drops</h2>

        <div class="product-grid">

            <div class="product-card">
                <img src="https://via.placeholder.com/200x250" alt="T-Shirt">
                <h3>IronVow Tee</h3>
                <p>KES 1,200</p>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200x250" alt="Hoodie">
                <h3>Warrior Hoodie</h3>
                <p>KES 3,500</p>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200x250" alt="Cap">
                <h3>Minimal Cap</h3>
                <p>KES 900</p>
            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>©️ 2026 IronVow Clothing. All rights reserved.</p>
    </footer>

    <script>
        function shopNow() {
            alert("Shop section coming soon. Stay ready.");
        }
    </script>

</body>
</html>
