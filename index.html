<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactable Cut</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}
button {
  padding: 15px 30px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
  font-size: 18px;
}
.products {
  display: none;
  padding: 20px;
}
.card {
  background: #111;
  padding: 20px;
  margin: 10px;
}
</style>
</head>

<body>

<div id="landing" class="center">
  <h1>ACCESS GRANTED</h1>
  <p>WELCOME TO INTERACTABLE CUT</p>
  <button onclick="enter()">ENTER STORE</button>
</div>
 <!-- CART BUTTON -->
  <button onclick="toggleCart()" style="background: #222; margin-bottom: 20px;">
    🛒 View Cart (<span id="cart-count">0</span>)
  </button>
<div id="store" class="products">
  <h2>Shop</h2>

  <div class="card">
    <h3>Black Hoodie</h3>
    <p>KES 2500</p>
    <button onclick="buy('Black Hoodie')">Buy</button>
  </div>

  <div class="card">
    <h3>White T-Shirt</h3>
    <p>KES 1500</p>
    <button onclick="buy('White T-Shirt')">Buy</button>
  </div>

  <div class="card">
    <h3>Oversized Hoodie</h3>
    <p>KES 3000</p>
    <button onclick="buy('Oversized Hoodie')">Buy</button>
  </div>

  <div class="card">
    <h3>Premium Cap</h3>
    <p>KES 1200</p>
    <button onclick="buy('Premium Cap')">Buy</button>
  </div>

  <div class="card">
    <h3>Graphic Tee</h3>
    <p>KES 1800</p>
    <button onclick="buy('Graphic Tee')">Buy</button>
  </div>

  <div class="card">
    <h3>Streetwear Tracksuit</h3>
    <p>KES 4500</p>
    <button onclick="buy('Tracksuit')">Buy</button>
  </div>

  <div class="card">
    <h3>Minimal Logo Tee</h3>
    <p>KES 1400</p>
    <button onclick="buy('Minimal Logo Tee')">Buy</button>
  </div>
  <!-- CART PANEL -->
  <div id="cart" style="display:none; background:#111; padding:20px; margin-top:20px;">
    <h3>Your Cart</h3>
    <div id="cart-items"></div>
    <p><strong>Total: KES <span id="cart-total">0</span></strong></p>
    <button onclick="checkout()">Checkout</button>
    <button onclick="toggleCart()" style="background:gray;">Close</button>
  </div>

</div>
<script>
function enter() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('store').style.display = 'block';
}

function buy(item) {
  let phone = prompt("Enter M-Pesa phone number:");
  if(phone) {
    alert("Payment request sent to " + phone + " for " + item);
  }
}
</script>

</body>
</html>
